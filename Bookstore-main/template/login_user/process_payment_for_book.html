{% extends "login_user/log_base.html" %}

{% block body_class %}blur-page{% endblock %}

{% block content %}
<div class="payment-container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 600px;">

    <h1 class="payment-title">Payment</h1>
    <p class="payment-description">Please confirm your payment details below:</p>

    <div class="card p-4">
        <form class="payment-form" action="{% url 'process_payment_for_book' allbooks.book_id  %}" method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    placeholder="Enter phone number" 
                    required 
                    pattern="[0-9]{11}" 
                    title="Please enter a valid 11-digit phone number."
                />
            </div><br>

            <div class="form-group">
                <label for="transaction-id">Transaction ID:</label>
                <input 
                    type="text" 
                    id="transaction-id" 
                    name="transaction_id" 
                    placeholder="Enter Transaction ID" 
                    required 
                    maxlength="20"
                />
            </div><br>

            <div class="form-group">
                <label for="amount">Amount (TK):</label>
                <input 
                    type="number" 
                    id="amount" 
                    name="amount" 
                    value="{{ allbooks.price }}"
                    readonly
                />
            </div><br>


            <!-- Proceed and Close buttons -->
            <div class="button-container">
                <button type="submit" class="submit-btn">Proceed</button>
                <button type="button" class="submit-btn" onclick="window.location.href='{% url 'log_books_details' allbooks.book_id %}';">Close</button>
            </div>
        </form>
    </div>
    
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert {{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
</div>
</div>
{% endblock %}
